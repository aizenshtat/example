name: Quality and Deploy

on:
  push:
  pull_request:

concurrency:
  group: example-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run quality checks
        run: npm run quality

  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'crowdship/')
    permissions:
      contents: read
      pull-requests: write
    env:
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      CROWDSHIP_BASE_URL: ${{ vars.CROWDSHIP_BASE_URL }}
      CROWDSHIP_CI_STATUS_TOKEN: ${{ secrets.CROWDSHIP_CI_STATUS_TOKEN }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_WEB_ROOT }}
      PREVIEW_ROOT: ${{ vars.DEPLOY_PREVIEW_ROOT }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ vars.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Resolve preview metadata
        id: meta
        run: |
          set -euo pipefail

          app_domain="${APP_DOMAIN:-example.aizenshtat.eu}"
          preview_base_url="https://${app_domain}/previews"
          branch="${GITHUB_HEAD_REF}"
          branch_suffix="${branch#crowdship/}"
          pr_body="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          pr_url="$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")"
          contribution_id=""

          while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*[Cc]ontribution([[:space:]_-]|[[:space:]-][[:space:]]*)[Ii]d:[[:space:]]*([A-Za-z0-9._-]+)[[:space:]]*$ ]]; then
              contribution_id="${BASH_REMATCH[2]}"
              break
            fi
          done <<<"$pr_body"

          if [[ -z "$contribution_id" && "$branch_suffix" == *"--"* ]]; then
            contribution_id="${branch_suffix%%--*}"
          fi

          if [[ -z "$contribution_id" && "$branch_suffix" =~ ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})-.+$ ]]; then
            contribution_id="${BASH_REMATCH[1]}"
          fi

          if [[ -z "$contribution_id" && "$branch_suffix" =~ ^([A-Za-z0-9._]+-[0-9]+)-.+$ ]]; then
            contribution_id="${BASH_REMATCH[1]}"
          fi

          if [[ -z "$contribution_id" ]]; then
            echo "Unable to resolve contribution id from branch '$branch'." >&2
            echo "Add 'Contribution ID: <id>' to the PR body or use a parseable branch name such as crowdship/<contribution-id>--<slug>." >&2
            exit 1
          fi

          sentry_org="${SENTRY_ORG:-crowdship}"
          sentry_project="${SENTRY_PROJECT:-example}"
          sentry_url="${SENTRY_URL:-https://sentry.io/}"
          release="example@${GITHUB_SHA}"
          issues_query="is:unresolved environment:preview contribution_id:${contribution_id} release:${release}"
          encoded_query="$(jq -nr --arg q "$issues_query" '$q|@uri')"
          sentry_issues_url="${sentry_url%/}/organizations/${sentry_org}/issues/?project=${sentry_project}&query=${encoded_query}"

          {
            echo "app_domain=$app_domain"
            echo "branch=$branch"
            echo "contribution_id=$contribution_id"
            echo "preview_url=${preview_base_url}/${contribution_id}/"
            echo "preview_mission_url=${preview_base_url}/${contribution_id}/mission"
            echo "pr_url=$pr_url"
            echo "release=$release"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "sentry_org=$sentry_org"
            echo "sentry_project=$sentry_project"
            echo "sentry_url=$sentry_url"
            echo "sentry_issues_url=$sentry_issues_url"
            echo "sentry_issues_api=${sentry_url%/}/api/0/projects/${sentry_org}/${sentry_project}/issues/?query=${encoded_query}&statsPeriod=24h"
          } >>"$GITHUB_OUTPUT"
      - name: Check preview deploy configuration
        id: deploy_config
        run: |
          set -euo pipefail

          app_domain="${APP_DOMAIN:-example.aizenshtat.eu}"
          deploy_root="${DEPLOY_ROOT:-/var/www/${app_domain}/html}"
          preview_root="${PREVIEW_ROOT:-${deploy_root%/}/previews}"
          required=(DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY)
          present_count=0
          missing=()

          for key in "${required[@]}"; do
            if [[ -n "${!key:-}" ]]; then
              present_count=$((present_count + 1))
            else
              missing+=("$key")
            fi
          done

          if (( present_count == 0 )); then
            echo "configured=false" >>"$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >>"$GITHUB_OUTPUT"
          elif (( present_count == ${#required[@]} )); then
            echo "configured=true" >>"$GITHUB_OUTPUT"
            echo "missing=" >>"$GITHUB_OUTPUT"
          else
            echo "Preview deploy configuration is partial. Missing: ${missing[*]}" >&2
            exit 1
          fi

          {
            echo "deploy_root=$deploy_root"
            echo "preview_root=$preview_root"
          } >>"$GITHUB_OUTPUT"
      - name: Build preview bundle
        id: build_preview
        env:
          VITE_SENTRY_BRANCH: ${{ steps.meta.outputs.branch }}
          VITE_SENTRY_CONTRIBUTION_ID: ${{ steps.meta.outputs.contribution_id }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: preview
          VITE_SENTRY_PR_NUMBER: ${{ github.event.pull_request.number }}
          VITE_SENTRY_RELEASE: ${{ steps.meta.outputs.release }}
        run: VITE_SOURCEMAP=true npm run build:preview
      - name: Create preview Sentry release
        id: sentry_preview
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ steps.meta.outputs.sentry_org }}
          SENTRY_PROJECT: ${{ steps.meta.outputs.sentry_project }}
          SENTRY_URL: ${{ steps.meta.outputs.sentry_url }}
        with:
          environment: preview
          ignore_missing: true
          release: ${{ steps.meta.outputs.release }}
          sourcemaps: ./dist
          url_prefix: '~/previews/${{ steps.meta.outputs.contribution_id }}'
      - name: Configure SSH
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [[ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >"$HOME/.ssh/known_hosts"
          fi

          chmod 600 "$HOME/.ssh/known_hosts"
      - name: Deploy preview
        id: deploy_preview
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          PREVIEW_ROOT: ${{ steps.deploy_config.outputs.preview_root }}
        run: |
          set -euo pipefail
          SKIP_BUILD=1 bash scripts/deploy-preview.sh "${{ steps.meta.outputs.contribution_id }}"
      - name: Install Playwright browsers
        if: steps.deploy_config.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium
      - name: Smoke test preview
        id: smoke_preview
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          root_html="$(mktemp)"
          smoke_file="$(mktemp)"
          trap 'rm -f "$root_html" "$smoke_file"' EXIT

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.preview_url }}" >"$root_html"
          grep -q '<title>Orbital Ops</title>' "$root_html"

          node scripts/preview-runtime-smoke.mjs "${{ steps.meta.outputs.preview_mission_url }}" >"$smoke_file"

          runtime_status="$(jq -r '.runtimeStatus' "$smoke_file")"
          crowdship_ready="$(jq -r '.crowdshipReady' "$smoke_file")"
          launcher_ready="$(jq -r '.launcherEnabled' "$smoke_file")"
          widget_shell_ready="$(jq -r '.widgetShellReady' "$smoke_file")"
          first_party_request_failures="$(jq -r '.firstPartyRequestFailures | length' "$smoke_file")"
          page_error_count="$(jq -r '.pageErrors | length' "$smoke_file")"
          console_error_count="$(jq -r '.consoleErrors | length' "$smoke_file")"

          {
            echo "runtime_status=$runtime_status"
            echo "crowdship_ready=$crowdship_ready"
            echo "launcher_ready=$launcher_ready"
            echo "widget_shell_ready=$widget_shell_ready"
            echo "first_party_request_failures=$first_party_request_failures"
            echo "page_error_count=$page_error_count"
            echo "console_error_count=$console_error_count"
          } >>"$GITHUB_OUTPUT"

          if [[ "$runtime_status" != 'verified' ]]; then
            cat "$smoke_file" >&2
            exit 1
          fi
      - name: Collect preview Sentry evidence
        id: evidence_preview
        if: always()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          issues_file="$(mktemp)"
          trap 'rm -f "$issues_file"' EXIT

          issue_count="unavailable"
          issue_status="unavailable"
          issue_detail="SENTRY_AUTH_TOKEN missing."

          if [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            status_code="$(curl --silent --show-error --location --output "$issues_file" --write-out '%{http_code}' \
              -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
              -H "Accept: application/json" \
              "${{ steps.meta.outputs.sentry_issues_api }}" || true)"

            if [[ "$status_code" == '200' ]]; then
              issue_count="$(jq 'length' "$issues_file")"
              issue_status="loaded"
              issue_detail="Loaded from the filtered Sentry issue query."
            elif [[ -n "$status_code" ]]; then
              issue_detail="Sentry issue query returned HTTP ${status_code}."
            else
              issue_detail="Sentry issue query could not be completed."
            fi
          fi

          {
            echo "issue_count=$issue_count"
            echo "issue_status=$issue_status"
            echo "issue_detail=$issue_detail"
          } >>"$GITHUB_OUTPUT"
      - name: Preview summary
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_preview.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_preview.outcome }}
          MISSING_DEPLOY: ${{ steps.deploy_config.outputs.missing }}
          SMOKE_OUTCOME: ${{ steps.smoke_preview.outcome }}
          SENTRY_OUTCOME: ${{ steps.sentry_preview.outcome }}
          RUNTIME_STATUS: ${{ steps.smoke_preview.outputs.runtime_status }}
          CROWDHIP_READY: ${{ steps.smoke_preview.outputs.crowdship_ready }}
          LAUNCHER_READY: ${{ steps.smoke_preview.outputs.launcher_ready }}
          WIDGET_SHELL_READY: ${{ steps.smoke_preview.outputs.widget_shell_ready }}
          FIRST_PARTY_REQUEST_FAILURES: ${{ steps.smoke_preview.outputs.first_party_request_failures }}
          PAGE_ERROR_COUNT: ${{ steps.smoke_preview.outputs.page_error_count }}
          CONSOLE_ERROR_COUNT: ${{ steps.smoke_preview.outputs.console_error_count }}
          ISSUE_COUNT: ${{ steps.evidence_preview.outputs.issue_count }}
          ISSUE_STATUS: ${{ steps.evidence_preview.outputs.issue_status }}
          ISSUE_DETAIL: ${{ steps.evidence_preview.outputs.issue_detail }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              preview_status="ready"
              preview_url_line="${{ steps.meta.outputs.preview_url }}"
            else
              preview_status="failed"
              preview_url_line="deployment failed before the preview was confirmed"
            fi
          else
            preview_status="configuration required"
            preview_url_line="not published; add ${MISSING_DEPLOY}"
          fi

          if [[ "$SENTRY_OUTCOME" == 'success' ]]; then
            sentry_release_line="${{ steps.meta.outputs.release }}"
          elif [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            sentry_release_line="release step failed"
          else
            sentry_release_line="not configured; add SENTRY_AUTH_TOKEN"
          fi

          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## Preview

          - Contribution ID: \`${{ steps.meta.outputs.contribution_id }}\`
          - Branch: \`${{ steps.meta.outputs.branch }}\`
          - PR: ${{ steps.meta.outputs.pr_url }}
          - Run: ${{ steps.meta.outputs.run_url }}
          - Build: ${BUILD_OUTCOME}
          - Preview status: ${preview_status}
          - Preview URL: ${preview_url_line}
          - Browser runtime smoke: ${RUNTIME_STATUS:-not-run}
          - Crowdship API ready: ${CROWDHIP_READY:-false}
          - Launcher enabled: ${LAUNCHER_READY:-false}
          - Widget open contract: ${WIDGET_SHELL_READY:-false}
          - First-party request failures: ${FIRST_PARTY_REQUEST_FAILURES:-unavailable}
          - Page errors: ${PAGE_ERROR_COUNT:-unavailable}
          - Console errors: ${CONSOLE_ERROR_COUNT:-unavailable}
          - Sentry release: ${sentry_release_line}
          - Filtered Sentry issues: ${{ steps.meta.outputs.sentry_issues_url }}
          - New unhandled preview errors: ${ISSUE_COUNT:-unavailable} (${ISSUE_DETAIL:-not queried})
          - Failed preview sessions: not collected in this workflow
          EOF
      - name: Report preview status to Crowdship
        if: always() && steps.meta.outcome == 'success'
        env:
          BUILD_OUTCOME: ${{ steps.build_preview.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_preview.outcome }}
          ISSUE_COUNT: ${{ steps.evidence_preview.outputs.issue_count }}
          ISSUE_STATUS: ${{ steps.evidence_preview.outputs.issue_status }}
          SMOKE_OUTCOME: ${{ steps.smoke_preview.outcome }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              preview_status="ready"
            else
              preview_status="failed"
            fi
          else
            preview_status="configuration_required"
          fi

          new_unhandled_preview_errors=""
          if [[ "$ISSUE_STATUS" == 'loaded' && "${ISSUE_COUNT:-}" =~ ^[0-9]+$ ]]; then
            new_unhandled_preview_errors="$ISSUE_COUNT"
          fi

          BUILD_STATUS="${BUILD_OUTCOME:-failure}" \
          PREVIEW_STATUS="$preview_status" \
          PREVIEW_URL="${{ steps.meta.outputs.preview_url }}" \
          REPOSITORY_FULL_NAME="${GITHUB_REPOSITORY}" \
          PULL_REQUEST_NUMBER="${{ github.event.pull_request.number }}" \
          PULL_REQUEST_STATUS="open" \
          PULL_REQUEST_URL="${{ steps.meta.outputs.pr_url }}" \
          BRANCH="${{ steps.meta.outputs.branch }}" \
          RUN_ID="${GITHUB_RUN_ID}" \
          RUN_URL="${{ steps.meta.outputs.run_url }}" \
          SENTRY_RELEASE="${{ steps.meta.outputs.release }}" \
          SENTRY_ISSUES_URL="${{ steps.meta.outputs.sentry_issues_url }}" \
          NEW_UNHANDLED_PREVIEW_ERRORS="$new_unhandled_preview_errors" \
          UPDATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          bash scripts/report-ci-status.sh preview "${{ steps.meta.outputs.contribution_id }}"
      - name: Update preview PR comment
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_preview.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_preview.outcome }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_OUTCOME: ${{ steps.sentry_preview.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke_preview.outcome }}
          RUNTIME_STATUS: ${{ steps.smoke_preview.outputs.runtime_status }}
          CROWDHIP_READY: ${{ steps.smoke_preview.outputs.crowdship_ready }}
          LAUNCHER_READY: ${{ steps.smoke_preview.outputs.launcher_ready }}
          WIDGET_SHELL_READY: ${{ steps.smoke_preview.outputs.widget_shell_ready }}
          FIRST_PARTY_REQUEST_FAILURES: ${{ steps.smoke_preview.outputs.first_party_request_failures }}
          PAGE_ERROR_COUNT: ${{ steps.smoke_preview.outputs.page_error_count }}
          CONSOLE_ERROR_COUNT: ${{ steps.smoke_preview.outputs.console_error_count }}
          ISSUE_COUNT: ${{ steps.evidence_preview.outputs.issue_count }}
          ISSUE_DETAIL: ${{ steps.evidence_preview.outputs.issue_detail }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              preview_status="ready"
              preview_url_line="- Preview URL: ${{ steps.meta.outputs.preview_url }}"
            else
              preview_status="failed"
              preview_url_line="- Preview URL: deployment failed before the preview responded"
            fi
          else
            preview_status="configuration required"
            preview_url_line="- Preview URL: not published; add ${{ steps.deploy_config.outputs.missing }}"
          fi

          if [[ "$SENTRY_OUTCOME" == 'success' ]]; then
            sentry_release_line="- Sentry release: \`${{ steps.meta.outputs.release }}\`"
          elif [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            sentry_release_line="- Sentry release: release step failed"
          else
            sentry_release_line="- Sentry release: not configured; add \`SENTRY_AUTH_TOKEN\`"
          fi

          marker="<!-- crowdship-preview-status -->"
          comment_file="$(mktemp)"
          payload_file="$(mktemp)"
          comments_file="$(mktemp)"
          trap 'rm -f "$comment_file" "$payload_file" "$comments_file"' EXIT

          cat >"$comment_file" <<EOF
          ${marker}
          ## Crowdship Preview

          - Status: ${preview_status}
          - Contribution ID: \`${{ steps.meta.outputs.contribution_id }}\`
          - Branch: \`${{ steps.meta.outputs.branch }}\`
          - PR: ${{ steps.meta.outputs.pr_url }}
          - Run: ${{ steps.meta.outputs.run_url }}
          - Build: ${BUILD_OUTCOME}
          ${preview_url_line}
          - Browser runtime smoke: ${RUNTIME_STATUS:-not-run}
          - Crowdship API ready: ${CROWDHIP_READY:-false}
          - Launcher enabled: ${LAUNCHER_READY:-false}
          - Widget open contract: ${WIDGET_SHELL_READY:-false}
          - First-party request failures: ${FIRST_PARTY_REQUEST_FAILURES:-unavailable}
          - Page errors: ${PAGE_ERROR_COUNT:-unavailable}
          - Console errors: ${CONSOLE_ERROR_COUNT:-unavailable}
          ${sentry_release_line}
          - Filtered Sentry issues: ${{ steps.meta.outputs.sentry_issues_url }}
          - New unhandled preview errors: ${ISSUE_COUNT:-unavailable} (${ISSUE_DETAIL:-not queried})
          - Failed preview sessions: not collected in this workflow
          EOF

          jq -Rs '{body: .}' <"$comment_file" >"$payload_file"

          comments_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments?per_page=100"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$comments_url" >"$comments_file"

          comment_id="$(jq -r --arg marker "$marker" '.[] | select(.body | contains($marker)) | .id' "$comments_file" | head -n 1)"

          if [[ -n "$comment_id" ]]; then
            curl --fail --silent --show-error \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d @"$payload_file" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" >/dev/null
          else
            curl --fail --silent --show-error \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d @"$payload_file" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" >/dev/null
          fi

  production:
    name: Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    env:
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      CROWDSHIP_BASE_URL: ${{ vars.CROWDSHIP_BASE_URL }}
      CROWDSHIP_CI_STATUS_TOKEN: ${{ secrets.CROWDSHIP_CI_STATUS_TOKEN }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_WEB_ROOT }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ vars.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Resolve production metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          resolve_contribution_id() {
            local branch_name="$1"
            local pull_request_body="$2"
            local branch_suffix=""
            local contribution_id=""

            while IFS= read -r line; do
              if [[ "$line" =~ ^[[:space:]]*[Cc]ontribution([[:space:]_-]|[[:space:]-][[:space:]]*)[Ii]d:[[:space:]]*([A-Za-z0-9._-]+)[[:space:]]*$ ]]; then
                contribution_id="${BASH_REMATCH[2]}"
                break
              fi
            done <<<"$pull_request_body"

            branch_suffix="${branch_name#crowdship/}"

            if [[ -z "$contribution_id" && "$branch_suffix" == *"--"* ]]; then
              contribution_id="${branch_suffix%%--*}"
            fi

            if [[ -z "$contribution_id" && "$branch_suffix" =~ ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})-.+$ ]]; then
              contribution_id="${BASH_REMATCH[1]}"
            fi

            if [[ -z "$contribution_id" && "$branch_suffix" =~ ^([A-Za-z0-9._]+-[0-9]+)-.+$ ]]; then
              contribution_id="${BASH_REMATCH[1]}"
            fi

            printf '%s\n' "$contribution_id"
          }

          app_domain="${APP_DOMAIN:-example.aizenshtat.eu}"
          deploy_root="${DEPLOY_ROOT:-/var/www/${app_domain}/html}"
          sentry_org="${SENTRY_ORG:-crowdship}"
          sentry_project="${SENTRY_PROJECT:-example}"
          sentry_url="${SENTRY_URL:-https://sentry.io/}"
          head_commit_message="$(jq -r '.head_commit.message // ""' "$GITHUB_EVENT_PATH")"
          contribution_id=""
          branch=""
          pull_request_number=""
          pull_request_url=""
          pull_request_body=""
          pull_request_file="$(mktemp)"
          trap 'rm -f "$pull_request_file"' EXIT

          if [[ "$head_commit_message" =~ ^Merge\ pull\ request\ #([0-9]+)\ from\ [^/]+/(.+)$ ]]; then
            pull_request_number="${BASH_REMATCH[1]}"
            branch="${BASH_REMATCH[2]}"
          elif [[ "$head_commit_message" =~ \(\#([0-9]+)\) ]]; then
            pull_request_number="${BASH_REMATCH[1]}"
          fi

          if [[ -n "$pull_request_number" ]]; then
            pull_request_status_code="$(
              curl --silent --show-error --location --output "$pull_request_file" --write-out '%{http_code}' \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pulls/${pull_request_number}" || true
            )"

            if [[ "$pull_request_status_code" == '200' ]]; then
              branch="${branch:-$(jq -r '.head.ref // ""' "$pull_request_file")}"
              pull_request_url="$(jq -r '.html_url // ""' "$pull_request_file")"
              pull_request_body="$(jq -r '.body // ""' "$pull_request_file")"
            else
              echo "Unable to load PR #${pull_request_number} for production CI status (HTTP ${pull_request_status_code:-unknown})." >&2
            fi
          fi

          contribution_id="$(resolve_contribution_id "$branch" "$pull_request_body")"

          {
            echo "app_domain=$app_domain"
            echo "branch=$branch"
            echo "contribution_id=$contribution_id"
            echo "deploy_root=$deploy_root"
            echo "pull_request_number=$pull_request_number"
            echo "pull_request_url=$pull_request_url"
            echo "production_url=https://${app_domain}/"
            echo "production_mission_url=https://${app_domain}/mission"
            echo "release=example@${GITHUB_SHA}"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "sentry_org=$sentry_org"
            echo "sentry_project=$sentry_project"
            echo "sentry_url=$sentry_url"
          } >>"$GITHUB_OUTPUT"
      - name: Check production deploy configuration
        id: deploy_config
        run: |
          set -euo pipefail

          required=(DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY)
          present_count=0
          missing=()

          for key in "${required[@]}"; do
            if [[ -n "${!key:-}" ]]; then
              present_count=$((present_count + 1))
            else
              missing+=("$key")
            fi
          done

          if (( present_count == 0 )); then
            echo "configured=false" >>"$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >>"$GITHUB_OUTPUT"
          elif (( present_count == ${#required[@]} )); then
            echo "configured=true" >>"$GITHUB_OUTPUT"
            echo "missing=" >>"$GITHUB_OUTPUT"
          else
            echo "Production deploy configuration is partial. Missing: ${missing[*]}" >&2
            exit 1
          fi
      - name: Build production bundle
        id: build_production
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ steps.meta.outputs.release }}
        run: VITE_SOURCEMAP=true npm run build
      - name: Create production Sentry release
        id: sentry_production
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ steps.meta.outputs.sentry_org }}
          SENTRY_PROJECT: ${{ steps.meta.outputs.sentry_project }}
          SENTRY_URL: ${{ steps.meta.outputs.sentry_url }}
        with:
          environment: production
          ignore_missing: true
          release: ${{ steps.meta.outputs.release }}
          sourcemaps: ./dist
          url_prefix: '~'
      - name: Configure SSH
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [[ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >"$HOME/.ssh/known_hosts"
          fi

          chmod 600 "$HOME/.ssh/known_hosts"
      - name: Deploy production
        id: deploy_production
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          DEPLOY_ROOT: ${{ steps.meta.outputs.deploy_root }}
        run: |
          set -euo pipefail
          SKIP_BUILD=1 bash scripts/deploy-static.sh
      - name: Smoke test production
        id: smoke_production
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          root_html="$(mktemp)"
          mission_html="$(mktemp)"
          trap 'rm -f "$root_html" "$mission_html"' EXIT

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.production_url }}" >"$root_html"
          grep -q '<title>Orbital Ops</title>' "$root_html"

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.production_mission_url }}" >"$mission_html"
          grep -q '<title>Orbital Ops</title>' "$mission_html"
      - name: Production summary
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_production.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_production.outcome }}
          MISSING_DEPLOY: ${{ steps.deploy_config.outputs.missing }}
          SENTRY_OUTCOME: ${{ steps.sentry_production.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke_production.outcome }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              deploy_status="published"
              deploy_url_line="${{ steps.meta.outputs.production_url }}"
            else
              deploy_status="failed"
              deploy_url_line="deployment failed before the production site was confirmed"
            fi
          else
            deploy_status="configuration required"
            deploy_url_line="not published; add ${MISSING_DEPLOY}"
          fi

          if [[ "$SENTRY_OUTCOME" == 'success' ]]; then
            sentry_release_line="${{ steps.meta.outputs.release }}"
          elif [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            sentry_release_line="release step failed"
          else
            sentry_release_line="not configured; add SENTRY_AUTH_TOKEN"
          fi

          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## Production

          - Run: ${{ steps.meta.outputs.run_url }}
          - Build: ${BUILD_OUTCOME}
          - Deploy status: ${deploy_status}
          - Production URL: ${deploy_url_line}
          - Sentry release: ${sentry_release_line}
          EOF
      - name: Report production status to Crowdship
        if: always() && steps.meta.outputs.contribution_id != ''
        env:
          BUILD_OUTCOME: ${{ steps.build_production.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_production.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke_production.outcome }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              production_status="published"
            else
              production_status="failed"
            fi
          else
            production_status="configuration_required"
          fi

          BUILD_STATUS="${BUILD_OUTCOME:-failure}" \
          PRODUCTION_STATUS="$production_status" \
          PRODUCTION_URL="${{ steps.meta.outputs.production_url }}" \
          REPOSITORY_FULL_NAME="${GITHUB_REPOSITORY}" \
          PULL_REQUEST_NUMBER="${{ steps.meta.outputs.pull_request_number }}" \
          PULL_REQUEST_STATUS="merged" \
          PULL_REQUEST_URL="${{ steps.meta.outputs.pull_request_url }}" \
          BRANCH="${{ steps.meta.outputs.branch }}" \
          RUN_ID="${GITHUB_RUN_ID}" \
          RUN_URL="${{ steps.meta.outputs.run_url }}" \
          GIT_SHA="${GITHUB_SHA}" \
          SENTRY_RELEASE="${{ steps.meta.outputs.release }}" \
          UPDATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          bash scripts/report-ci-status.sh production "${{ steps.meta.outputs.contribution_id }}"
