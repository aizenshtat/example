name: Quality and Deploy

on:
  push:
  pull_request:

concurrency:
  group: example-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run quality checks
        run: npm run quality

  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'crowdship/')
    permissions:
      contents: read
      pull-requests: write
    env:
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_WEB_ROOT }}
      PREVIEW_ROOT: ${{ vars.DEPLOY_PREVIEW_ROOT }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ vars.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Resolve preview metadata
        id: meta
        run: |
          set -euo pipefail

          app_domain="${APP_DOMAIN:-example.aizenshtat.eu}"
          preview_base_url="https://${app_domain}/previews"
          branch="${GITHUB_HEAD_REF}"
          branch_suffix="${branch#crowdship/}"
          pr_body="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          pr_url="$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")"
          contribution_id=""

          while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*[Cc]ontribution([[:space:]_-]|[[:space:]-][[:space:]]*)[Ii]d:[[:space:]]*([A-Za-z0-9._-]+)[[:space:]]*$ ]]; then
              contribution_id="${BASH_REMATCH[2]}"
              break
            fi
          done <<<"$pr_body"

          if [[ -z "$contribution_id" && "$branch_suffix" == *"--"* ]]; then
            contribution_id="${branch_suffix%%--*}"
          fi

          if [[ -z "$contribution_id" && "$branch_suffix" =~ ^([A-Za-z0-9._]+-[0-9]+)-.+$ ]]; then
            contribution_id="${BASH_REMATCH[1]}"
          fi

          if [[ -z "$contribution_id" ]]; then
            echo "Unable to resolve contribution id from branch '$branch'." >&2
            echo "Add 'Contribution ID: <id>' to the PR body or use a parseable branch name such as crowdship/<contribution-id>--<slug>." >&2
            exit 1
          fi

          sentry_org="${SENTRY_ORG:-crowdship}"
          sentry_project="${SENTRY_PROJECT:-example}"
          sentry_url="${SENTRY_URL:-https://sentry.io/}"
          release="example@${GITHUB_SHA}"
          issues_query="is:unresolved environment:preview contribution_id:${contribution_id} release:${release}"
          encoded_query="$(jq -nr --arg q "$issues_query" '$q|@uri')"
          sentry_issues_url="${sentry_url%/}/organizations/${sentry_org}/issues/?project=${sentry_project}&query=${encoded_query}"

          {
            echo "app_domain=$app_domain"
            echo "branch=$branch"
            echo "contribution_id=$contribution_id"
            echo "preview_url=${preview_base_url}/${contribution_id}/"
            echo "preview_mission_url=${preview_base_url}/${contribution_id}/mission"
            echo "pr_url=$pr_url"
            echo "release=$release"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "sentry_org=$sentry_org"
            echo "sentry_project=$sentry_project"
            echo "sentry_url=$sentry_url"
            echo "sentry_issues_url=$sentry_issues_url"
          } >>"$GITHUB_OUTPUT"
      - name: Check preview deploy configuration
        id: deploy_config
        run: |
          set -euo pipefail

          app_domain="${APP_DOMAIN:-example.aizenshtat.eu}"
          deploy_root="${DEPLOY_ROOT:-/var/www/${app_domain}/html}"
          preview_root="${PREVIEW_ROOT:-${deploy_root%/}/previews}"
          required=(DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY)
          present_count=0
          missing=()

          for key in "${required[@]}"; do
            if [[ -n "${!key:-}" ]]; then
              present_count=$((present_count + 1))
            else
              missing+=("$key")
            fi
          done

          if (( present_count == 0 )); then
            echo "configured=false" >>"$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >>"$GITHUB_OUTPUT"
          elif (( present_count == ${#required[@]} )); then
            echo "configured=true" >>"$GITHUB_OUTPUT"
            echo "missing=" >>"$GITHUB_OUTPUT"
          else
            echo "Preview deploy configuration is partial. Missing: ${missing[*]}" >&2
            exit 1
          fi

          {
            echo "deploy_root=$deploy_root"
            echo "preview_root=$preview_root"
          } >>"$GITHUB_OUTPUT"
      - name: Build preview bundle
        id: build_preview
        run: VITE_SOURCEMAP=true npm run build:preview
      - name: Create preview Sentry release
        id: sentry_preview
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ steps.meta.outputs.sentry_org }}
          SENTRY_PROJECT: ${{ steps.meta.outputs.sentry_project }}
          SENTRY_URL: ${{ steps.meta.outputs.sentry_url }}
        with:
          environment: preview
          ignore_missing: true
          release: ${{ steps.meta.outputs.release }}
          sourcemaps: ./dist
          url_prefix: '~/previews/${{ steps.meta.outputs.contribution_id }}'
      - name: Configure SSH
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [[ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >"$HOME/.ssh/known_hosts"
          fi

          chmod 600 "$HOME/.ssh/known_hosts"
      - name: Deploy preview
        id: deploy_preview
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          PREVIEW_ROOT: ${{ steps.deploy_config.outputs.preview_root }}
        run: |
          set -euo pipefail
          SKIP_BUILD=1 bash scripts/deploy-preview.sh "${{ steps.meta.outputs.contribution_id }}"
      - name: Smoke test preview
        id: smoke_preview
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          root_html="$(mktemp)"
          mission_html="$(mktemp)"
          trap 'rm -f "$root_html" "$mission_html"' EXIT

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.preview_url }}" >"$root_html"
          grep -q '<title>Orbital Ops</title>' "$root_html"

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.preview_mission_url }}" >"$mission_html"
          grep -q '<title>Orbital Ops</title>' "$mission_html"
      - name: Preview summary
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_preview.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_preview.outcome }}
          MISSING_DEPLOY: ${{ steps.deploy_config.outputs.missing }}
          SMOKE_OUTCOME: ${{ steps.smoke_preview.outcome }}
          SENTRY_OUTCOME: ${{ steps.sentry_preview.outcome }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              preview_status="ready"
              preview_url_line="${{ steps.meta.outputs.preview_url }}"
            else
              preview_status="failed"
              preview_url_line="deployment failed before the preview was confirmed"
            fi
          else
            preview_status="configuration required"
            preview_url_line="not published; add ${MISSING_DEPLOY}"
          fi

          if [[ "$SENTRY_OUTCOME" == 'success' ]]; then
            sentry_release_line="${{ steps.meta.outputs.release }}"
          elif [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            sentry_release_line="release step failed"
          else
            sentry_release_line="not configured; add SENTRY_AUTH_TOKEN"
          fi

          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## Preview

          - Contribution ID: \`${{ steps.meta.outputs.contribution_id }}\`
          - Branch: \`${{ steps.meta.outputs.branch }}\`
          - PR: ${{ steps.meta.outputs.pr_url }}
          - Run: ${{ steps.meta.outputs.run_url }}
          - Build: ${BUILD_OUTCOME}
          - Preview status: ${preview_status}
          - Preview URL: ${preview_url_line}
          - Sentry release: ${sentry_release_line}
          - Filtered Sentry issues: ${{ steps.meta.outputs.sentry_issues_url }}
          - New unhandled preview errors: unavailable until runtime Sentry tagging is wired into the app
          - Failed preview sessions: unavailable until Session Replay is configured
          EOF
      - name: Update preview PR comment
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_preview.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_preview.outcome }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_OUTCOME: ${{ steps.sentry_preview.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke_preview.outcome }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              preview_status="ready"
              preview_url_line="- Preview URL: ${{ steps.meta.outputs.preview_url }}"
            else
              preview_status="failed"
              preview_url_line="- Preview URL: deployment failed before the preview responded"
            fi
          else
            preview_status="configuration required"
            preview_url_line="- Preview URL: not published; add ${{ steps.deploy_config.outputs.missing }}"
          fi

          if [[ "$SENTRY_OUTCOME" == 'success' ]]; then
            sentry_release_line="- Sentry release: \`${{ steps.meta.outputs.release }}\`"
          elif [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            sentry_release_line="- Sentry release: release step failed"
          else
            sentry_release_line="- Sentry release: not configured; add \`SENTRY_AUTH_TOKEN\`"
          fi

          marker="<!-- crowdship-preview-status -->"
          comment_file="$(mktemp)"
          payload_file="$(mktemp)"
          comments_file="$(mktemp)"
          trap 'rm -f "$comment_file" "$payload_file" "$comments_file"' EXIT

          cat >"$comment_file" <<EOF
          ${marker}
          ## Crowdship Preview

          - Status: ${preview_status}
          - Contribution ID: \`${{ steps.meta.outputs.contribution_id }}\`
          - Branch: \`${{ steps.meta.outputs.branch }}\`
          - PR: ${{ steps.meta.outputs.pr_url }}
          - Run: ${{ steps.meta.outputs.run_url }}
          - Build: ${BUILD_OUTCOME}
          ${preview_url_line}
          ${sentry_release_line}
          - Filtered Sentry issues: ${{ steps.meta.outputs.sentry_issues_url }}
          - New unhandled preview errors: unavailable until runtime Sentry tagging is wired into the app
          - Failed preview sessions: unavailable until Session Replay is configured
          EOF

          jq -Rs '{body: .}' <"$comment_file" >"$payload_file"

          comments_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments?per_page=100"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$comments_url" >"$comments_file"

          comment_id="$(jq -r --arg marker "$marker" '.[] | select(.body | contains($marker)) | .id' "$comments_file" | head -n 1)"

          if [[ -n "$comment_id" ]]; then
            curl --fail --silent --show-error \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d @"$payload_file" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" >/dev/null
          else
            curl --fail --silent --show-error \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d @"$payload_file" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" >/dev/null
          fi

  production:
    name: Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_ROOT: ${{ vars.DEPLOY_WEB_ROOT }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ vars.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Resolve production metadata
        id: meta
        run: |
          set -euo pipefail

          app_domain="${APP_DOMAIN:-example.aizenshtat.eu}"
          deploy_root="${DEPLOY_ROOT:-/var/www/${app_domain}/html}"
          sentry_org="${SENTRY_ORG:-crowdship}"
          sentry_project="${SENTRY_PROJECT:-example}"
          sentry_url="${SENTRY_URL:-https://sentry.io/}"

          {
            echo "app_domain=$app_domain"
            echo "deploy_root=$deploy_root"
            echo "production_url=https://${app_domain}/"
            echo "production_mission_url=https://${app_domain}/mission"
            echo "release=example@${GITHUB_SHA}"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "sentry_org=$sentry_org"
            echo "sentry_project=$sentry_project"
            echo "sentry_url=$sentry_url"
          } >>"$GITHUB_OUTPUT"
      - name: Check production deploy configuration
        id: deploy_config
        run: |
          set -euo pipefail

          required=(DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY)
          present_count=0
          missing=()

          for key in "${required[@]}"; do
            if [[ -n "${!key:-}" ]]; then
              present_count=$((present_count + 1))
            else
              missing+=("$key")
            fi
          done

          if (( present_count == 0 )); then
            echo "configured=false" >>"$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >>"$GITHUB_OUTPUT"
          elif (( present_count == ${#required[@]} )); then
            echo "configured=true" >>"$GITHUB_OUTPUT"
            echo "missing=" >>"$GITHUB_OUTPUT"
          else
            echo "Production deploy configuration is partial. Missing: ${missing[*]}" >&2
            exit 1
          fi
      - name: Build production bundle
        id: build_production
        run: VITE_SOURCEMAP=true npm run build
      - name: Create production Sentry release
        id: sentry_production
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ steps.meta.outputs.sentry_org }}
          SENTRY_PROJECT: ${{ steps.meta.outputs.sentry_project }}
          SENTRY_URL: ${{ steps.meta.outputs.sentry_url }}
        with:
          environment: production
          ignore_missing: true
          release: ${{ steps.meta.outputs.release }}
          sourcemaps: ./dist
          url_prefix: '~'
      - name: Configure SSH
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          if [[ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >"$HOME/.ssh/known_hosts"
          fi

          chmod 600 "$HOME/.ssh/known_hosts"
      - name: Deploy production
        id: deploy_production
        if: steps.deploy_config.outputs.configured == 'true'
        env:
          DEPLOY_ROOT: ${{ steps.meta.outputs.deploy_root }}
        run: |
          set -euo pipefail
          SKIP_BUILD=1 bash scripts/deploy-static.sh
      - name: Smoke test production
        id: smoke_production
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          root_html="$(mktemp)"
          mission_html="$(mktemp)"
          trap 'rm -f "$root_html" "$mission_html"' EXIT

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.production_url }}" >"$root_html"
          grep -q '<title>Orbital Ops</title>' "$root_html"

          curl --fail --silent --show-error --location "${{ steps.meta.outputs.production_mission_url }}" >"$mission_html"
          grep -q '<title>Orbital Ops</title>' "$mission_html"
      - name: Production summary
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_production.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy_production.outcome }}
          MISSING_DEPLOY: ${{ steps.deploy_config.outputs.missing }}
          SENTRY_OUTCOME: ${{ steps.sentry_production.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke_production.outcome }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.deploy_config.outputs.configured }}" == 'true' ]]; then
            if [[ "$DEPLOY_OUTCOME" == 'success' && "$SMOKE_OUTCOME" == 'success' ]]; then
              deploy_status="published"
              deploy_url_line="${{ steps.meta.outputs.production_url }}"
            else
              deploy_status="failed"
              deploy_url_line="deployment failed before the production site was confirmed"
            fi
          else
            deploy_status="configuration required"
            deploy_url_line="not published; add ${MISSING_DEPLOY}"
          fi

          if [[ "$SENTRY_OUTCOME" == 'success' ]]; then
            sentry_release_line="${{ steps.meta.outputs.release }}"
          elif [[ -n "${SENTRY_AUTH_TOKEN:-}" ]]; then
            sentry_release_line="release step failed"
          else
            sentry_release_line="not configured; add SENTRY_AUTH_TOKEN"
          fi

          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## Production

          - Run: ${{ steps.meta.outputs.run_url }}
          - Build: ${BUILD_OUTCOME}
          - Deploy status: ${deploy_status}
          - Production URL: ${deploy_url_line}
          - Sentry release: ${sentry_release_line}
          EOF
