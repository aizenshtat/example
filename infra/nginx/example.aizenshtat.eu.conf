server {
    listen 80;
    listen [::]:80;
    server_name example.aizenshtat.eu;

    root /var/www/example.aizenshtat.eu/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        try_files /index.html =404;
    }

    location = /mission {
        try_files /index.html =404;
    }

    location ~ ^/previews/([^/]+)(/.*)?$ {
        try_files $uri $uri/ /previews/$1/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
